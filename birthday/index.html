<!DOCTYPE html>
<html>
<head>
<title>Birthday Surprise 🎂</title>

<style>

body{
font-family:Arial;
text-align:center;
background:radial-gradient(circle at top,#1b2735,#090a0f);
height:100vh;
overflow:hidden;
color:white;
}

/* Galaxy stars */

.star{
position:absolute;
width:3px;
height:3px;
background:white;
border-radius:50%;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{opacity:0.3;}
to{opacity:1;}
}

/* Heart rain */

.heart{
position:absolute;
color:red;
font-size:20px;
animation:fall 6s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10vh);}
100%{transform:translateY(110vh);}
}

/* Anime characters */

.anime{
position:absolute;
width:120px;
z-index:1;
}

.anime.left{
bottom:0;
left:10px;
}

.anime.right{
bottom:0;
right:10px;
}

.anime.top{
top:10px;
right:40%;
}

/* Title */

h1{
margin-top:150px;
font-size:45px;
}

/* Buttons */

button{
padding:15px 35px;
font-size:18px;
border:none;
border-radius:12px;
margin:20px;
cursor:pointer;
}

#yes{
background:#4CAF50;
color:white;
}

#no{
background:#f44336;
color:white;
position:absolute;
}

/* Gallery */

#gallery{
display:none;
margin-top:40px;
}

/* Slideshow */

.slideshow{
width:260px;
height:260px;
margin:auto;
}

.slideshow img{
width:100%;
height:100%;
object-fit:cover;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.5);
}

/* Message */

.message{
background:white;
color:black;
padding:20px;
border-radius:12px;
max-width:600px;
margin:auto;
font-size:18px;
}

</style>
</head>

<body>

<!-- Anime characters -->
<img src="Anya & Yuji.jpg" class="anime left">
<img src="❣️Tanjiro and Nezuko 💕.jpg" class="anime right">
<img src="download (6).jpg" class="anime top">

<h1>Do you like me sister? 😇💖</h1>

<button id="yes" onclick="showSurprise()">Yes ❤️</button>
<button id="no" onmouseover="moveButton()">No 😅</button>

<audio id="music" src="ytmp3free.cc_thozhi-thozhisong-hey-sinamika-movie-a-r-rahman-music-youtubemp3free.org.mp3"></audio>

<div id="gallery">

<h1>🎂 Happy Birthday kutachi 🎂</h1>

<div class="message" id="typing"></div>

<br>

<div class="slideshow">
<img id="slide" src="kutachi.jpeg">
</div>

</div>

<script>

/* create stars */

for(let i=0;i<120;i++){
let star=document.createElement("div")
star.className="star"
star.style.left=Math.random()*100+"vw"
star.style.top=Math.random()*100+"vh"
document.body.appendChild(star)
}

/* Heart rain */

for(let i=0;i<40;i++){
let heart=document.createElement("div")
heart.innerHTML="❤️"
heart.className="heart"
heart.style.left=Math.random()*100+"vw"
heart.style.animationDuration=(3+Math.random()*5)+"s"
document.body.appendChild(heart)
}

/* escaping button */

function moveButton(){

var button=document.getElementById("no")

var x=Math.random()*(window.innerWidth-button.offsetWidth)
var y=Math.random()*(window.innerHeight-button.offsetHeight)

button.style.left=x+"px"
button.style.top=y+"px"

}

/* show surprise */

function showSurprise(){

document.querySelector("h1").style.display="none"
document.getElementById("yes").style.display="none"
document.getElementById("no").style.display="none"

document.getElementById("gallery").style.display="block"

document.getElementById("music").play()

typeMessage()

startSlideshow()

confetti()

}

/* typing message */

let text="You are not just my sister, you are my best friend ❤️ I am really lucky to have you in my life. May your life be full of happiness, love and success. Happy Birthday 🎂🎉"

let i=0

function typeMessage(){

if(i<text.length){
document.getElementById("typing").innerHTML+=text.charAt(i)
i++
setTimeout(typeMessage,40)
}

}

/* slideshow */

let photos=[
"2.jpeg",
"3.jpeg",
"4.jpeg",
"5.jpeg"
]

let index=0

function startSlideshow(){

setInterval(function(){

index++
if(index>=photos.length){index=0}

document.getElementById("slide").src=photos[index]

},2000)

}

/* confetti */

function confetti(){

for(let i=0;i<120;i++){

let div=document.createElement("div")

div.style.position="absolute"
div.style.width="10px"
div.style.height="10px"
div.style.background="hsl("+Math.random()*360+",100%,50%)"

div.style.left=Math.random()*window.innerWidth+"px"
div.style.top="-10px"

document.body.appendChild(div)

div.animate(
[{transform:"translateY(0px)"},{transform:"translateY(100vh)"}],
{duration:3000+Math.random()*2000}
)

}

}

</script>

</body>
</html>
